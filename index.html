<div class="app">
  <aside class="side"><div class="brand"><div class="logo">ZD</div><div><h1>左邓座位互助系统</h1><p class="muted">V3版 · 数据存在 Supabase</p></div></div><p class="muted">请先注册账户，注册完成后登陆系统进行自证上传，管理员审核后可以进入系统。</p><p class="muted">审核未通过不显示座位图，审核通过后用户能看到附近同担详细资料哦！</p><p class="muted">遇到bug请联系微博@Satiter_左邓指引标</p></aside>
  <main><header class="top"><div><h2>左邓粉丝 · 银河综艺馆 · 同担座位互助</h2><p class="muted">由左邓粉丝研发，仅限左邓粉丝使用。</p><p class="red-warning">严禁大范围传播！唯粉进入自动祝福左邓性福99！</p></div><button id="logoutBtn" class="btn secondary hide">退出</button></header><div id="app" class="wrap"><section class="panel"><div class="head"><h3>正在加载登录入口</h3></div><div class="body"><div class="status">正在加载中，如有问题请联系管理组。</div></div></section></div></main>

<script>
window.addEventListener('error', function(event){ var el=document.getElementById('app'); if(el) el.innerHTML='<section class="panel"><div class="head"><h3>页面脚本报错</h3></div><div class="body"><div class="status">'+String(event.message||'未知错误')+'</div></div></section>'; });
window.addEventListener('unhandledrejection', function(event){ var el=document.getElementById('app'); var msg=event.reason&&event.reason.message?event.reason.message:event.reason; if(el) el.innerHTML='<section class="panel"><div class="head"><h3>加载失败</h3></div><div class="body"><div class="status">'+String(msg||'未知错误')+'</div></div></section>'; });
const SUPABASE_URL = 'https://whusghlbepizbkhhddlb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodXNnaGxiZXBpemJraGhkZGxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTQ4MDksImV4cCI6MjA5ODA3MDgwOX0.X-GfbDkrTSHUd3lbiYcQru3av5YWXdm7dzTPgbflQCA';
if (!window.supabase) { throw new Error('Supabase 脚本没有加载成功，请刷新或检查网络'); }
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const state = { token: localStorage.getItem('zd_token') || '', user: null, fields: [], zones: [], days: [{dayKey:'day1',label:'Day1'},{dayKey:'day2',label:'Day2'}], users: [], submissions: [], tab: 'login', adminTab: 'audit', selectedZone: '101区', selectedDay: 'day1', adminDay: 'day1', seatEditMode: false, adminSearch: '', adminInitial: 'all' };
const app = document.getElementById('app');
const logoutBtn = document.getElementById('logoutBtn');
const esc = (v) => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function rpc(name, args={}){ const {data,error}=await client.rpc(name,args); if(error) throw new Error(error.message); return data; }
async function boot(){ try{ state.fields = await rpc('zd_proof_fields'); state.zones = await rpc('zd_zones'); try{ state.days = await rpc('zd_days'); }catch(_){ state.days = [{dayKey:'day1',label:'Day1'},{dayKey:'day2',label:'Day2'}]; } if(!state.days.length)state.days=[{dayKey:'day1',label:'Day1'},{dayKey:'day2',label:'Day2'}]; state.selectedDay=state.days[0].dayKey; state.adminDay=state.days[0].dayKey; if(state.token){ state.user = await rpc('zd_me',{p_token:state.token}); if(!state.user) localStorage.removeItem('zd_token'); } render(); }catch(e){ app.innerHTML='<div class="status">加载失败：'+esc(e.message)+'</div>'; }}
function setUser(token,user){ state.token=token; state.user=user; if(token)localStorage.setItem('zd_token',token); render(); }
logoutBtn.onclick=async()=>{ if(state.token) await rpc('zd_logout',{p_token:state.token}).catch(()=>{}); localStorage.removeItem('zd_token'); state.token=''; state.user=null; render(); };
function render(){ logoutBtn.classList.toggle('hide',!state.user); if(!state.user) return renderAuth(); if(['needs_proof','rejected'].includes(state.user.status)) return renderProof(); if(state.user.status==='pending') return html('<section class="panel"><div class="body"><div class="status"><b>等待管理员审核</b><p class="muted">审核通过前不会显示座位图、人数、红点或同担信息。</p></div></div></section>'); if(state.user.role==='admin') return renderAdmin(); return renderUser(); }
function html(s){ app.innerHTML=s; }
function modalForm({title='提示',message='',fields=[],okText='确定',cancelText='取消',hideCancel=false,danger=false}={}){
  return new Promise(resolve=>{
    const modal=document.createElement('div');
    modal.className='edit-modal';
    const body=(message?'<p class="modal-message">'+esc(message)+'</p>':'')+fields.map(f=>{
      const value=esc(f.value||'');
      if(f.type==='textarea')return '<label class="field full"><span>'+esc(f.label)+'</span><textarea name="'+esc(f.id)+'" placeholder="'+esc(f.placeholder||'')+'">'+value+'</textarea></label>';
      if(f.type==='select')return '<label class="field full"><span>'+esc(f.label)+'</span><select name="'+esc(f.id)+'">'+(f.options||[]).map(o=>'<option value="'+esc(o.value??o)+'" '+((o.value??o)===f.value?'selected':'')+'>'+esc(o.label??o)+'</option>').join('')+'</select></label>';
      return '<label class="field full"><span>'+esc(f.label)+'</span><input name="'+esc(f.id)+'" type="'+esc(f.type||'text')+'" value="'+value+'" placeholder="'+esc(f.placeholder||'')+'"></label>';
    }).join('');
    modal.innerHTML='<div class="edit-card"><div class="head"><h3>'+esc(title)+'</h3></div><div class="body">'+body+'<div class="modal-actions">'+(hideCancel?'':'<button class="btn secondary" data-modal-cancel>'+esc(cancelText)+'</button>')+'<button class="btn '+(danger?'danger':'')+'" data-modal-ok>'+esc(okText)+'</button></div></div></div>';
    document.body.appendChild(modal);
    const close=(value)=>{modal.remove();resolve(value)};
    const first=modal.querySelector('input,textarea,select');
    if(first)setTimeout(()=>first.focus(),20);
    const cancel=modal.querySelector('[data-modal-cancel]');
    if(cancel)cancel.onclick=()=>close(null);
    modal.querySelector('[data-modal-ok]').onclick=()=>{
      const values={};
      fields.forEach(f=>{const el=[...modal.querySelectorAll('[name]')].find(item=>item.name===f.id);values[f.id]=el?el.value:''});
      close(values);
    };
  });
}
async function appAlert(message,title='提示'){await modalForm({title,message:String(message||''),hideCancel:true});}
async function appConfirm(message,title='请确认',danger=false){return !!(await modalForm({title,message:String(message||''),okText:'确定',cancelText:'取消',danger}));}
async function appPrompt(title,label,{value='',placeholder='',textarea=false}={}){const res=await modalForm({title,fields:[{id:'value',label,value,placeholder,type:textarea?'textarea':'text'}]});return res?String(res.value||'').trim():null;}
window.alert=(message)=>{appAlert(message)};
window.confirm=(message)=>{appAlert(message,'请确认');return false};
window.prompt=(message)=>{appAlert(message,'请输入');return null};
let loadingModal=null;
function showLoading(message='正在上传，请等待，不要关闭页面。',title='正在上传'){
  hideLoading();
  loadingModal=document.createElement('div');

  loadingModal.innerHTML='<div class="edit-card"><div class="head"><h3>'+esc(title)+'</h3></div><div class="body"><p class="modal-message">'+esc(message)+'</p><div class="upload-spinner"></div></div></div>';
  document.body.appendChild(loadingModal);
}
function hideLoading(){if(loadingModal){loadingModal.remove();loadingModal=null}}
function renderAuth(){
  html('<section class="panel auth-hero"><div class="auth-card"><div class="auth-copy"><h3>左邓粉丝专属座位互助</h3><p class="muted">先注册账号，提交自证，通过后再登记座位。未审核用户不会看到座位图。</p><div class="steps"><div class="step"><span class="dot">1</span>注册账号</div><div class="step"><span class="dot">2</span>上传自证</div><div class="step"><span class="dot">3</span>等待审核</div><div class="step"><span class="dot">4</span>座位审核后查看附近同担</div></div></div><div class="auth-form"><div class="tabs"><button id="loginTab" class="'+(state.tab==='login'?'active':'')+'">登录</button><button id="regTab" class="'+(state.tab==='register'?'active':'')+'">注册账号</button></div><div class="form"><label class="field full"><span>账号 / 昵称</span><input id="account"></label><label class="field full"><span>密码</span><input id="password" type="password"></label>'+(state.tab==='register'?'<label class="field full"><span>确认密码</span><input id="password2" type="password"></label>':'')+'<button id="authGo" class="btn full">'+(state.tab==='register'?'注册':'登录')+'</button><p class="muted full">如果忘记密码，请联系小管注销旧账号，再注册新的。</p></div></div></div></section>');
  document.getElementById('loginTab').onclick=()=>{state.tab='login';render()};
  document.getElementById('regTab').onclick=()=>{state.tab='register';render()};
  document.getElementById('authGo').onclick=authGo;
}
async function authGo(){ const account=document.getElementById('account').value.trim(); const password=document.getElementById('password').value; try{ if(state.tab==='register'){ if(password!==document.getElementById('password2').value) return await appAlert('两次密码不一致'); const res=await rpc('zd_register',{p_account:account,p_password:password}); await appAlert('注册成功\n\n你的账号是：'+account+'\n密码是：'+password+'\n\n请截图避免遗忘。','注册成功'); setUser(res.token,res.user); }else{ const res=await rpc('zd_login',{p_account:account,p_password:password}); setUser(res.token,res.user); }}catch(e){await appAlert(e.message,'出错了')} }
function renderProof(){
  const fields=state.fields.map(f=>proofInput(f)).join('');
  html('<section class="panel"><div class="head"><h3>上传身份自证</h3></div><div class="body"><form id="proofForm" class="form">'+(state.user.rejectReason?'<div class="status full"><b>打回原因</b><p>'+esc(state.user.rejectReason)+'</p></div>':'')+'<div class="status full"><b>提交前请检查清楚</b><p class="muted">身份自证提交后，审核结果出来前不能修改。身份审核通过后，再分别提交 Day1 / Day2 的座位截图审核。</p></div><label class="field">微博名<input name="weiboName" value="'+esc(state.user.weiboName)+'" required></label><label class="field">微信名<input name="wechatName" value="'+esc(state.user.wechatName)+'" required></label><label class="field full">是否在线下群<select name="offlineGroup" required><option value="">请选择</option><option '+(state.user.offlineGroup==='是'?'selected':'')+'>是</option><option '+(state.user.offlineGroup==='否'?'selected':'')+'>否</option></select></label>'+fields+'<button class="btn full">提交身份审核</button></form></div></section>');
  document.getElementById('proofForm').onsubmit=submitProof;
}
function isProfileField(f){return ['微博名','微信名','是否在线下群'].includes(f.label)}
function proofLabelHtml(f){ const required=f.required!==false; return '<span class="proof-label">'+(required?'<b class="proof-required">*</b>':'')+'<span>'+esc(f.label)+'</span>'+(required?'':'<small class="muted">（可选）</small>')+'</span>'; }
function proofInput(f){
  if(isProfileField(f)) return '';
  const required=f.required!==false;
  const req=required?' required':'';
  const label=proofLabelHtml(f);

function validateImageFile(file){
  if(!file||!file.name)throw new Error('请先选择截图');
  if(!file.size)throw new Error('这张截图好像是空文件，请重新选择图片');
  if(file.size>15*1024*1024)throw new Error('截图太大啦，请压缩到 15MB 以内再上传');
  const name=String(file.name||'').toLowerCase();
  const supported=/\.(jpe?g|png|webp|gif)$/.test(name)||['image/jpeg','image/png','image/webp','image/gif'].includes(file.type);
  if(!supported)throw new Error('截图格式暂时只支持 JPG、PNG、WEBP 或 GIF。如果手机默认是 HEIC，请先截图或转成 JPG 再上传。');
}
function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms))}
function checkImageUrl(url){
  return new Promise((resolve,reject)=>{
    const image=new Image();
    const timer=setTimeout(()=>{image.onload=null;image.onerror=null;reject(new Error('图片链接检查超时'))},8000);
    image.onload=()=>{clearTimeout(timer);resolve(true)};
    image.onerror=()=>{clearTimeout(timer);reject(new Error('图片没有成功显示'))};
    image.src=url+(url.includes('?')?'&':'?')+'check='+Date.now();
  });
}
async function verifyUploadedImage(url){
  let lastError=null;
  for(let i=0;i<3;i++){
    try{await checkImageUrl(url);return url;}catch(e){lastError=e;await sleep(700)}
  }
  throw new Error('这张截图上传后没有成功显示，请重新选择图片再提交。建议使用 JPG 或 PNG。');
}
async function uploadImage(file,prefixName){
  validateImageFile(file);
  const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const filePath=state.user.id+'/'+prefixName+'-'+Date.now()+'-'+safe;
  const up=await client.storage.from('proof-files').upload(filePath,file,{upsert:false,contentType:file.type||'image/jpeg'});
  if(up.error) throw new Error(up.error.message);
  const publicUrl=client.storage.from('proof-files').getPublicUrl(filePath).data.publicUrl;
  await verifyUploadedImage(publicUrl);
  return publicUrl;
}
async function submitProof(ev){
  ev.preventDefault();
  const submitBtn=ev.submitter||ev.target.querySelector('button');
  const oldText=submitBtn?submitBtn.textContent:'';
  if(submitBtn){submitBtn.disabled=true;submitBtn.textContent='提交中...'}
  const fd=new FormData(ev.target);
  const answers=[];
  try{
    showLoading('身份自证和截图正在上传，请等待，不要关闭页面。','正在上传');
    for(const f of state.fields){
      if(isProfileField(f)) continue;
      const required=f.required!==false;
      if(f.type==='image'){
        const file=fd.get(f.id);
        if(!file||!file.name){ if(required) throw new Error('自证项还没填完：'+f.label); else continue; }
        const pub=await uploadImage(file,f.id);
        answers.push({fieldId:f.id,fileUrl:pub});
      } else if(f.type==='checkbox'){
        const vals=fd.getAll(f.id);
        if(!vals.length){ if(required) throw new Error('自证项还没填完：'+f.label); else continue; }
        answers.push({fieldId:f.id,valueJson:vals});
      } else {
        const v=String(fd.get(f.id)||'').trim();
        if(!v){ if(required) throw new Error('自证项还没填完：'+f.label); else continue; }
        answers.push({fieldId:f.id,valueText:v});
      }
    }
    const user=await rpc('zd_submit_proof',{p_token:state.token,p_weibo:fd.get('weiboName'),p_wechat:fd.get('wechatName'),p_offline:fd.get('offlineGroup')==='是',p_answers:answers});
    state.user=user;
    hideLoading();
    render();
  }catch(e){
    if(submitBtn){submitBtn.disabled=false;submitBtn.textContent=oldText}
    hideLoading();
    await appAlert(e.message,'出错了')
  }
}

function rowLabel(row){
  const n=Number(row);
  if(!Number.isFinite(n)||n<1)return String(row||'').toUpperCase();
  let x=Math.floor(n), out='';
  while(x>0){x--;out=String.fromCharCode(65+(x%26))+out;x=Math.floor(x/26)}
  return out;
}
function rowInputToNumber(value){
  const raw=String(value||'').trim().toUpperCase();
  if(!raw)throw new Error('排号请填英文字母，例如 A 或 E');
  if(!/^[A-Z]+$/.test(raw))throw new Error('排号只支持英文字母，例如 A、E、F；不要填数字');
  let n=0;
  for(const ch of raw){n=n*26+(ch.charCodeAt(0)-64)}
  return n;
}
function rowCountInputToNumber(value){
  const raw=String(value||'').trim();
  if(!/^\d+$/.test(raw))throw new Error('排数请填数字，例如 8');
  return Math.max(1,Number(raw));
}
function zoneRowStart(cfg){return Math.max(1,Number(cfg?.rowStart||1)||1)}
function zoneRowEnd(cfg){return zoneRowStart(cfg)+(cfg?.rowCounts?.length||0)-1}
function rowMaxFor(cfg,row){return cfg.rowCounts[row-zoneRowStart(cfg)]||0}

function renderSeatWindow(seat, people){
  const cfg=zoneConfig(seat.zone);
  if(!cfg)return '<div class="status">区域配置不存在</div>';
  const firstRow=zoneRowStart(cfg);
  const lastRow=zoneRowEnd(cfg);
  const startRow=Math.max(firstRow,seat.row-5);
  const endRow=Math.min(lastRow,seat.row+5);
  const startNo=Math.max(1,seat.no-10);
  const rowMaxes=[];
  for(let r=startRow;r<=endRow;r++)rowMaxes.push(rowMaxFor(cfg,r));
  const maxAround=Math.max(...rowMaxes,seat.no+10);
  const endNo=Math.min(maxAround,seat.no+10);
  let rows='';
  for(let r=startRow;r<=endRow;r++){
    const rowMax=rowMaxFor(cfg,r);
    let dots='';
    for(let n=startNo;n<=Math.min(endNo,rowMax);n++){
      const isMine=r===seat.row&&n===seat.no;
      const owner=people.find(p=>p.seat&&p.seat.row===r&&p.seat.no===n);
      dots+='<div class="seat-dot '+(isMine?'mine':owner?'taken':'')+'" title="'+esc(rowLabel(r)+'行'+n+'号'+(owner?' · '+owner.weiboName:''))+'">'+(isMine?'我':owner?'':'')+'</div>';
    }
    rows+='<div class="seat-line"><div class="row-label">'+rowLabel(r)+'行</div><div class="seat-strip">'+dots+'</div></div>';
  }
  return '<div class="legend"><span><i class="seat-dot mine">我</i>自己</span><span><i class="seat-dot taken"></i>附近同担</span><span><i class="seat-dot"></i>空位/未知</span></div><div class="seat-window">'+rows+'</div>';
}

function pinyinInitial(text){
  const s=String(text||'').trim();
  if(!s)return '#';
  const ch=s[0];
  const upper=ch.toUpperCase();
  if(/[A-Z]/.test(upper))return upper;
  const marks=['阿','芭','擦','搭','蛾','发','噶','哈','击','喀','垃','妈','拿','哦','啪','期','然','撒','塌','挖','昔','压','匝'];
  const initials=['A','B','C','D','E','F','G','H','J','K','L','M','N','O','P','Q','R','S','T','W','X','Y','Z'];
  for(let i=marks.length-1;i>=0;i--){
    if(ch.localeCompare(marks[i],'zh-Hans-CN-u-co-pinyin')>=0)return initials[i];
  }
  return '#';
}
function pinyinInitials(text){return String(text||'').split('').map(pinyinInitial).join('').toLowerCase()}

function rowModeOptions(value){return '<option value="end" '+(value==='end'?'selected':'')+'>按末排</option><option value="count" '+(value==='count'?'selected':'')+'>按排数</option>'}
function rowPlanValue(z){return rowLabel(zoneRowEnd(z))}
function parseRows(v,rowValue,max,rowStart,mode){
  const custom=String(v||'').trim();
  if(custom){
    const arr=custom.split(/[,，\s]+/).map(Number).filter(n=>Number.isFinite(n)&&n>0);
    if(arr.length)return arr;
  }
  const seatMax=Math.max(1,Number(max)||1);
  let rowCount=1;
  if(mode==='end'){
    const endRow=rowInputToNumber(rowValue);
    if(endRow<rowStart)throw new Error('末排不能早于起始排');
    rowCount=endRow-rowStart+1;
  }else{
    rowCount=rowCountInputToNumber(rowValue);
  }
  return Array.from({length:rowCount},()=>seatMax);
}

function zonePayloadFromCard(card,old){
  const zone=card.querySelector('.zone-name').value.trim();
  const tier=card.querySelector('.zone-tier').value;
  const countsEl=card.querySelector('.zone-counts');
  const rowsEl=card.querySelector('.zone-rows');
  const maxEl=card.querySelector('.zone-max');
  const startEl=card.querySelector('.zone-start');
  const modeEl=card.querySelector('.zone-row-mode');
  if(!zone)throw new Error('请填写区名');
  const rowStart=rowInputToNumber(startEl?startEl.value:'A');
  const counts=parseRows(countsEl?countsEl.value:'',rowsEl?rowsEl.value:'M',maxEl?maxEl.value:1,rowStart,modeEl?modeEl.value:'end');
  return {old,zone,tier,counts,rowStart};
}

function requiredOptions(value){return '<option value="true" '+(value!==false?'selected':'')+'>必填</option><option value="false" '+(value===false?'selected':'')+'>非必填</option>'}
function renderProofConfig(){
  const fields=state.fields.filter(f=>!isProfileField(f));
  const add='<div class="config-add status" data-proof-card="new"><label class="field"><span>新增项名称</span><input class="pf-label" placeholder="如 微博主页自证"></label><label class="field"><span>类型</span><select class="pf-type">'+proofTypeOptions('image')+'</select></label><label class="field"><span>必填状态</span><select class="pf-required">'+requiredOptions(true)+'</select></label><label class="field"><span>选项</span><input class="pf-options" placeholder="单选/多选用：是,否"></label><button class="btn" data-proof-act="add">新增</button></div>';
  const toolbar='<div class="status"><b>排序</b><p class="proof-sort-note">按住每项左侧的拖动块上下移动，排好后点“保存排序”。新增、修改、删除仍然单独保存。</p><button class="btn secondary" data-proof-act="sort">保存排序</button></div>';
  const list=fields.length?'<div id="proofSortList" class="proof-sort-list">'+fields.map(f=>'<div class="config-card proof-sort-card" draggable="true" data-proof-card="old" data-field-id="'+esc(f.id)+'"><span class="drag-handle" title="拖动排序">↕</span><label class="field"><span>名称</span><input class="pf-label" value="'+esc(f.label)+'"></label><label class="field"><span>类型</span><select class="pf-type">'+proofTypeOptions(f.type)+'</select></label><label class="field"><span>必填状态</span><select class="pf-required">'+requiredOptions(f.required!==false)+'</select></label><label class="field"><span>选项</span><input class="pf-options" value="'+esc((f.options||[]).join(','))+'" placeholder="单选/多选用：是,否"></label><button class="btn secondary" data-proof-act="save">保存</button><button class="btn danger" data-proof-act="delete">删除</button></div>').join('')+'</div>':'<div class="status">暂无自证项</div>';
  document.getElementById('adminBody').innerHTML='<div class="config-wrap">'+add+toolbar+list+'</div>';
  document.querySelectorAll('[data-proof-act]').forEach(btn=>btn.onclick=()=>{
    if(btn.dataset.proofAct==='sort') return saveProofSort();
    const card=btn.closest('[data-proof-card]');
    if(btn.dataset.proofAct==='add') addField(card);
    if(btn.dataset.proofAct==='save') saveField(card);
    if(btn.dataset.proofAct==='delete') deleteField(card.dataset.fieldId);
  });
  bindProofSort();
}
function bindProofSort(){
  const list=document.getElementById('proofSortList');
  if(!list)return;
  list.querySelectorAll('[data-proof-card="old"]').forEach(card=>{
    card.addEventListener('dragstart',e=>{card.classList.add('dragging'); if(e.dataTransfer)e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
  });
  list.addEventListener('dragover',e=>{
    e.preventDefault();
    const dragging=list.querySelector('.dragging');
    if(!dragging)return;
    const after=getDragAfterElement(list,e.clientY);
    if(after==null)list.appendChild(dragging); else list.insertBefore(dragging,after);
  });
}
function getDragAfterElement(container,y){
  return [...container.querySelectorAll('[data-proof-card="old"]:not(.dragging)')].reduce((closest,child)=>{
    const box=child.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.offset)return {offset,element:child};
    return closest;
  },{offset:Number.NEGATIVE_INFINITY}).element;
}
function proofCardPayload(card){
  return {
    label:card.querySelector('.pf-label').value.trim(),
    type:card.querySelector('.pf-type').value,
    required:card.querySelector('.pf-required').value==='true',
    options:card.querySelector('.pf-options').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean)
  };
}
window.addField=async(card)=>{ try{ const p=proofCardPayload(card); if(!p.label)return await appAlert('请填写自证项名称'); await rpc('zd_admin_add_proof_field',{p_token:state.token,p_label:p.label,p_type:p.type,p_options:p.options,p_required:p.required}); state.fields=await rpc('zd_proof_fields'); await appAlert('自证项已新增','保存成功'); renderAdmin(); }catch(e){await appAlert(e.message,'出错了')} };
window.saveField=async(card)=>{ try{ const p=proofCardPayload(card); if(!p.label)return await appAlert('请填写自证项名称'); await rpc('zd_admin_update_proof_field',{p_token:state.token,p_field_id:card.dataset.fieldId,p_label:p.label,p_type:p.type,p_options:p.options,p_required:p.required}); state.fields=await rpc('zd_proof_fields'); await appAlert('自证配置已保存','保存成功'); renderAdmin(); }catch(e){await appAlert(e.message,'出错了')} };
window.saveProofSort=async()=>{ try{ const ids=[...document.querySelectorAll('#proofSortList [data-field-id]')].map(card=>card.dataset.fieldId); if(!ids.length)return await appAlert('目前没有可排序的自证项'); await rpc('zd_admin_sort_proof_fields',{p_token:state.token,p_field_ids:ids}); state.fields=await rpc('zd_proof_fields'); await appAlert('自证项顺序已保存','保存成功'); renderAdmin(); }catch(e){await appAlert(e.message,'出错了')} };
window.deleteField=async(id)=>{ try{ await rpc('zd_admin_delete_proof_field',{p_token:state.token,p_field_id:id}); state.fields=await rpc('zd_proof_fields'); await appAlert('自证项已删除','已删除'); renderAdmin(); }catch(e){await appAlert(e.message,'出错了')} };
boot();
</script>
</body>
</html>
