  <style>
    :root{--bg:#eef9fb;--bg2:#f7fffb;--panel:rgba(255,255,255,.88);--panel2:#f8fffd;--line:#cce8e8;--text:#173238;--muted:#6c8790;--red:#e85d75;--green:#66cdb5;--blue:#81c7ee;--mint:#dff8ef;--shadow:0 18px 42px rgba(64,139,150,.14)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 18% 6%,#d9f7ff 0,#d9f7ff 24%,transparent 25%),radial-gradient(circle at 86% 16%,#daf9ea 0,#daf9ea 20%,transparent 21%),linear-gradient(135deg,var(--bg),var(--bg2));color:var(--text);font:14px/1.58 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}.app{min-height:100vh;display:grid;grid-template-columns:300px 1fr}.side{border-right:1px solid var(--line);padding:30px 28px;background:rgba(255,255,255,.62);backdrop-filter:blur(18px);position:sticky;top:0;height:100vh}.logo{width:48px;height:48px;border:1px solid #bfe6e4;display:grid;place-items:center;border-radius:14px;color:#168b83;background:linear-gradient(145deg,#efffff,#d9f7ee);font-weight:900;box-shadow:var(--shadow)}.brand{display:flex;gap:13px;align-items:center;margin-bottom:20px}.brand h1{font-size:20px;margin:0;letter-spacing:.2px}.muted{color:var(--muted);font-size:13px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:28px 34px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.36);backdrop-filter:blur(14px)}.top h2{margin:0;font-size:26px}.top p{margin:7px 0 0}.wrap{padding:30px 34px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;margin-bottom:20px;box-shadow:var(--shadow);overflow:hidden}.head{padding:17px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(90deg,rgba(224,250,255,.65),rgba(232,255,244,.45))}.head h3{margin:0;font-size:16px}.body{padding:20px}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field{display:grid;gap:7px}.field span{color:var(--muted);font-size:12px}.full{grid-column:1/-1}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;background:#fff;color:var(--text);border:1px solid #bddfde;border-radius:12px;padding:11px 12px;outline:none}input:focus,select:focus,textarea:focus{border-color:#72c6df;box-shadow:0 0 0 3px rgba(129,199,238,.22)}textarea{min-height:78px;resize:vertical}.btn{border:0;background:linear-gradient(135deg,#7fcdf2,#78d9bc);color:#073235;border-radius:999px;padding:10px 16px;cursor:pointer;font-weight:700;box-shadow:0 8px 18px rgba(84,171,181,.22)}.btn.secondary{background:#fff;color:#23606b;border:1px solid #bddfde;box-shadow:none}.btn.danger{background:#fff2f5;color:#b32745;border:1px solid #f2b7c4;box-shadow:none}.tabs{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}.tabs button{background:#fff;color:#4f747c;border:1px solid #cce8e8;border-radius:999px;padding:8px 13px}.tabs .active{background:linear-gradient(135deg,#caefff,#d9f8eb);color:#12464d;border-color:#9bdedc;font-weight:800}.grid{display:grid;grid-template-columns:1.06fr .94fr;gap:20px}.row{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:13px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.72);margin-bottom:10px}.row.danger{border-color:#f0b9c5;background:#fff5f7}.status{padding:15px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.72);margin-bottom:12px}.seats,.admin-seats{display:grid;grid-template-columns:repeat(auto-fill,15px);gap:6px;margin-bottom:12px}.seat{width:15px;height:15px;border-radius:5px;background:#dceff0;border:1px solid #c6e1e3}.seat.taken{background:var(--red);border-color:#ff9bad}.seat.mine{background:var(--green);border-color:#6ad7bf}.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}.proofs{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:10px}.proof{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff}.proof img{width:100%;max-height:150px;object-fit:cover;border-radius:10px}.mini{display:flex;gap:8px;flex-wrap:wrap}.mini input,.mini select{width:110px}.hide{display:none}.auth-hero{max-width:760px;margin:20px auto}.auth-card{display:grid;grid-template-columns:1fr 1.15fr;gap:0}.auth-copy{padding:28px;background:linear-gradient(160deg,#d9f7ff,#e1fbef);border-right:1px solid var(--line)}.auth-copy h3{font-size:25px;margin:0 0 10px}.steps{display:grid;gap:9px;margin-top:22px}.step{display:flex;gap:10px;align-items:center;color:#315f67}.dot{width:22px;height:22px;border-radius:999px;background:#fff;display:grid;place-items:center;color:#208d86;font-size:12px;font-weight:900}.auth-form{padding:26px}.legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:8px 0 14px}.legend span{display:inline-flex;gap:6px;align-items:center;color:var(--muted);font-size:13px}.seat-window{display:grid;gap:8px;margin-bottom:16px;padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.58);overflow-x:auto;-webkit-overflow-scrolling:touch}.seat-line{display:grid;grid-template-columns:44px max-content;gap:8px;align-items:center;min-width:max-content}.row-label{color:var(--muted);font-size:12px;text-align:right}.seat-strip{display:flex;gap:5px;flex-wrap:nowrap;white-space:nowrap}.seat-dot{width:18px;height:18px;flex:0 0 18px;border-radius:6px;background:#dceff0;border:1px solid #c6e1e3;color:#74939b;font-size:9px;display:grid;place-items:center}.seat-dot.taken{background:var(--red);border-color:#ff9bad;color:#fff}.seat-dot.mine{background:var(--green);border-color:#6ad7bf;color:#063b32}.near-list{display:grid;gap:10px}.config-wrap{display:grid;gap:18px}.config-add{display:grid;grid-template-columns:1fr 150px 90px 90px 1.6fr auto;gap:10px;align-items:end}.config-group{display:grid;gap:10px}.config-group h4{margin:8px 0 0;font-size:15px;color:#168b83}.config-card{display:grid;grid-template-columns:120px 120px 90px 90px 1fr auto auto;gap:10px;align-items:end;padding:13px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.72)}.state-chip{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;background:#e7f7f4;color:#167c73;font-size:12px;font-weight:800;margin-left:8px}.state-chip.rejected{background:#fff2f5;color:#b32745}.state-chip.pending{background:#fff8df;color:#8a6b00}.state-chip.deactivated{background:#eef1f2;color:#63757b}.lightbox{position:fixed;inset:0;background:rgba(9,35,40,.72);display:grid;place-items:center;z-index:1000;padding:20px}.lightbox img{max-width:min(92vw,980px);max-height:88vh;border-radius:18px;box-shadow:0 24px 80px rgba(0,0,0,.35);background:#fff}.lightbox.hide{display:none}.proof img{cursor:zoom-in}.admin-seats{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}.admin-row-line{display:grid;grid-template-columns:44px max-content;gap:8px;align-items:center;min-width:max-content}.admin-seat-strip{display:flex;gap:5px;flex-wrap:nowrap;white-space:nowrap}@media(max-width:850px){.config-add,.config-card{grid-template-columns:1fr}.app{display:block}.side{height:auto;position:static}.grid,.form,.auth-card{grid-template-columns:1fr}.auth-copy{border-right:0;border-bottom:1px solid var(--line)}.top{padding:20px}.wrap{padding:18px}.row{grid-template-columns:1fr}.full{grid-column:auto}}
  </style>

<body>
<div class="app">
  <aside class="side"><div class="brand"><div class="logo">CP</div><div><h1>左邓粉丝座位互助系统</h1><p class="muted">浅蓝浅绿版 · 数据存在 Supabase</p></div></div><p class="muted">请先注册账户，注册完成后登陆系统进行自证上传，管理员审核后可以进入系统。</p><p class="muted">审核未通过不显示座位图，审核通过后用户能看到附近同担详细资料哦！</p></aside>
  <main><header class="top"><div><h2>左邓粉丝 · 银河综艺馆 · 同担座位互助</h2><p class="muted">由左邓粉丝研发，仅限左邓粉丝使用。</p></div><button id="logoutBtn" class="btn secondary hide">退出</button></header><div id="app" class="wrap"><section class="panel"><div class="head"><h3>正在加载登录入口</h3></div><div class="body"><div class="status">如果这里一直不变，请截图发给我。</div></div></section></div></main>
</div><div id="lightbox" class="lightbox hide"><img id="lightboxImg" alt="自证大图"></div>
<script>
window.addEventListener('error', function(event){ var el=document.getElementById('app'); if(el) el.innerHTML='<section class="panel"><div class="head"><h3>页面脚本报错</h3></div><div class="body"><div class="status">'+String(event.message||'未知错误')+'</div></div></section>'; });
window.addEventListener('unhandledrejection', function(event){ var el=document.getElementById('app'); var msg=event.reason&&event.reason.message?event.reason.message:event.reason; if(el) el.innerHTML='<section class="panel"><div class="head"><h3>加载失败</h3></div><div class="body"><div class="status">'+String(msg||'未知错误')+'</div></div></section>'; });
const SUPABASE_URL = 'https://whusghlbepizbkhhddlb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodXNnaGxiZXBpemJraGhkZGxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTQ4MDksImV4cCI6MjA5ODA3MDgwOX0.X-GfbDkrTSHUd3lbiYcQru3av5YWXdm7dzTPgbflQCA';
if (!window.supabase) { throw new Error('Supabase 脚本没有加载成功，请刷新或检查网络'); }
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const state = { token: localStorage.getItem('zd_token') || '', user: null, fields: [], zones: [], users: [], submissions: [], tab: 'login', adminTab: 'audit', selectedZone: '101区' };
const app = document.getElementById('app');
const logoutBtn = document.getElementById('logoutBtn');
const esc = (v) => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function rpc(name, args={}){ const {data,error}=await client.rpc(name,args); if(error) throw new Error(error.message); return data; }
async function boot(){ try{ state.fields = await rpc('zd_proof_fields'); state.zones = await rpc('zd_zones'); if(state.token){ state.user = await rpc('zd_me',{p_token:state.token}); if(!state.user) localStorage.removeItem('zd_token'); } render(); }catch(e){ app.innerHTML='<div class="status">加载失败：'+esc(e.message)+'</div>'; }}
function setUser(token,user){ state.token=token; state.user=user; if(token)localStorage.setItem('zd_token',token); render(); }
logoutBtn.onclick=async()=>{ if(state.token) await rpc('zd_logout',{p_token:state.token}).catch(()=>{}); localStorage.removeItem('zd_token'); state.token=''; state.user=null; render(); };
function render(){ logoutBtn.classList.toggle('hide',!state.user); if(!state.user) return renderAuth(); if(['needs_proof','rejected'].includes(state.user.status)) return renderProof(); if(state.user.status==='pending') return html('<section class="panel"><div class="body"><div class="status"><b>等待管理员审核</b><p class="muted">审核通过前不会显示座位图、人数、红点或同担信息。</p></div></div></section>'); if(state.user.role==='admin') return renderAdmin(); return renderUser(); }
function html(s){ app.innerHTML=s; }
function renderAuth(){
  html('<section class="panel auth-hero"><div class="auth-card"><div class="auth-copy"><h3>左邓粉丝专属座位互助</h3><p class="muted">先注册证号，提交自证，通过后再登记座位。未审核用户不会看到座位图。</p><div class="steps"><div class="step"><span class="dot">1</span>注册证号</div><div class="step"><span class="dot">2</span>上传自证</div><div class="step"><span class="dot">3</span>等待审核</div><div class="step"><span class="dot">4</span>查看附近同担</div></div></div><div class="auth-form"><div class="tabs"><button id="loginTab" class="'+(state.tab==='login'?'active':'')+'">登录</button><button id="regTab" class="'+(state.tab==='register'?'active':'')+'">注册证号</button></div><div class="form"><label class="field full"><span>账号 / 证号</span><input id="account"></label><label class="field full"><span>密码</span><input id="password" type="password"></label>'+(state.tab==='register'?'<label class="field full"><span>确认密码</span><input id="password2" type="password"></label>':'')+'<button id="authGo" class="btn full">'+(state.tab==='register'?'注册':'登录')+'</button><p class="muted full">如果忘记密码，请联系小管注销旧账号，再注册新的。</p></div></div></div></section>');
  document.getElementById('loginTab').onclick=()=>{state.tab='login';render()};
  document.getElementById('regTab').onclick=()=>{state.tab='register';render()};
  document.getElementById('authGo').onclick=authGo;
}
async function authGo(){ const account=document.getElementById('account').value.trim(); const password=document.getElementById('password').value; try{ if(state.tab==='register'){ if(password!==document.getElementById('password2').value) return alert('两次密码不一致'); const res=await rpc('zd_register',{p_account:account,p_password:password}); alert('注册成功\n\n你的账号是：'+account+'\n密码是：'+password+'\n\n请截图避免遗忘。'); setUser(res.token,res.user); }else{ const res=await rpc('zd_login',{p_account:account,p_password:password}); setUser(res.token,res.user); }}catch(e){alert(e.message)} }
function renderProof(){ const fields=state.fields.map(f=>proofInput(f)).join(''); html('<section class="panel"><div class="head"><h3>上传自证</h3></div><div class="body"><form id="proofForm" class="form">'+(state.user.rejectReason?'<div class="status full"><b>打回原因</b><p>'+esc(state.user.rejectReason)+'</p></div>':'')+'<label class="field">微博名<input name="weiboName" value="'+esc(state.user.weiboName)+'" required></label><label class="field">微信名<input name="wechatName" value="'+esc(state.user.wechatName)+'" required></label><label class="field full">是否在线下群<select name="offlineGroup" required><option value="">请选择</option><option '+(state.user.offlineGroup==='是'?'selected':'')+'>是</option><option '+(state.user.offlineGroup==='否'?'selected':'')+'>否</option></select></label>'+fields+'<button class="btn full">提交审核</button></form></div></section>'); document.getElementById('proofForm').onsubmit=submitProof; }
function isProfileField(f){return ['微博名','微信名','是否在线下群'].includes(f.label)}
function proofInput(f){ if(isProfileField(f)) return ''; if(f.type==='image') return '<label class="field full">'+esc(f.label)+'<input name="'+f.id+'" type="file" accept="image/*" required></label>'; if(f.type==='text') return '<label class="field full">'+esc(f.label)+'<input name="'+f.id+'" required></label>'; if(f.type==='radio') return '<label class="field full">'+esc(f.label)+'<select name="'+f.id+'" required><option value="">请选择</option>'+(f.options||[]).map(o=>'<option>'+esc(o)+'</option>').join('')+'</select></label>'; return '<div class="field full"><span>'+esc(f.label)+'</span>'+(f.options||[]).map(o=>'<label><input type="checkbox" name="'+f.id+'" value="'+esc(o)+'"> '+esc(o)+'</label>').join('')+'</div>'; }
async function submitProof(ev){ ev.preventDefault(); const fd=new FormData(ev.target); const answers=[]; try{ for(const f of state.fields){ if(isProfileField(f)) continue; if(f.type==='image'){ const file=fd.get(f.id); if(!file||!file.name) throw new Error('自证项还没填完：'+f.label); const path=state.user.id+'/'+f.id+'-'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_'); const up=await client.storage.from('proof-files').upload(path,file,{upsert:false}); if(up.error) throw new Error(up.error.message); const pub=client.storage.from('proof-files').getPublicUrl(path).data.publicUrl; answers.push({fieldId:f.id,fileUrl:pub}); } else if(f.type==='checkbox'){ const vals=fd.getAll(f.id); if(!vals.length) throw new Error('自证项还没填完：'+f.label); answers.push({fieldId:f.id,valueJson:vals}); } else { const v=String(fd.get(f.id)||'').trim(); if(!v) throw new Error('自证项还没填完：'+f.label); answers.push({fieldId:f.id,valueText:v}); }} const user=await rpc('zd_submit_proof',{p_token:state.token,p_weibo:fd.get('weiboName'),p_wechat:fd.get('wechatName'),p_offline:fd.get('offlineGroup')==='是',p_answers:answers}); state.user=user; alert('已提交，等待管理员审核'); render(); }catch(e){alert(e.message)} }
function zoneOptions(){return state.zones.map(z=>'<option value="'+esc(z.zone)+'">'+esc(z.zone)+'</option>').join('')}
function renderUser(){ html('<div class="grid"><section class="panel"><div class="head"><h3>附近座位窗口</h3><span class="muted">前后 5 排、左右 10 号</span></div><div class="body" id="nearBox">正在加载...</div></section><section class="panel"><div class="head"><h3>我的互助信息</h3></div><div class="body"><div class="status"><b>'+esc(state.user.weiboName)+'</b><p>'+(state.user.seat?'我的座位：'+seatText(state.user.seat):'还没有登记座位')+'</p><label class="field">我的附近留言<textarea id="note">'+esc(state.user.fanNote)+'</textarea></label><button id="saveNote" class="btn secondary">保存留言</button></div><div class="status"><b>修改公开资料</b><div class="form"><label class="field"><span>微博名</span><input id="profileWeibo" value="'+esc(state.user.weiboName)+'"></label><label class="field"><span>微信名</span><input id="profileWechat" value="'+esc(state.user.wechatName)+'"></label><label class="field full"><span>是否在线下群</span><select id="profileOffline"><option '+(state.user.offlineGroup==='是'?'selected':'')+'>是</option><option '+(state.user.offlineGroup==='否'?'selected':'')+'>否</option></select></label><button id="saveProfile" class="btn secondary full">保存公开资料</button></div></div><div class="tabs"><button id="seatTab" class="active">修改座位</button></div><div class="form"><label class="field">区<select id="seatZone">'+zoneOptions()+'</select></label><label class="field">排<input id="seatRow" type="number" value="'+(state.user.seat?.row||1)+'"></label><label class="field">号<input id="seatNo" type="number" value="'+(state.user.seat?.no||1)+'"></label><button id="saveSeat" class="btn full">保存座位</button></div></div></section></div>'); if(state.user.seat) document.getElementById('seatZone').value=state.user.seat.zone; document.getElementById('saveSeat').onclick=saveSeat; document.getElementById('saveNote').onclick=saveNote; document.getElementById('saveProfile').onclick=saveProfile; loadNearby(); }
function seatText(s){return s.zone+'-'+s.row+'排-'+s.no+'号'}
function statusLabel(s){return {approved:'已审核',pending:'待审核',rejected:'已打回',needs_proof:'待提交自证',deactivated:'已注销'}[s]||s}
async function saveSeat(){ try{ const user=await rpc('zd_save_seat',{p_token:state.token,p_zone:document.getElementById('seatZone').value,p_row:+document.getElementById('seatRow').value,p_no:+document.getElementById('seatNo').value,p_message:document.getElementById('note').value}); state.user=user; alert('座位已保存'); render(); }catch(e){alert(e.message)} }
async function saveNote(){ try{ const user=await rpc('zd_save_note',{p_token:state.token,p_note:document.getElementById('note').value}); state.user=user; alert('留言已保存'); render(); }catch(e){alert(e.message)} }
async function saveProfile(){ try{ const user=await rpc('zd_update_profile',{p_token:state.token,p_weibo:document.getElementById('profileWeibo').value,p_wechat:document.getElementById('profileWechat').value,p_offline:document.getElementById('profileOffline').value==='是'}); state.user=user; alert('公开资料已保存'); render(); }catch(e){alert(e.message)} }
function zoneConfig(zone){return state.zones.find(z=>z.zone===zone)}
function renderSeatWindow(seat, people){
  const cfg=zoneConfig(seat.zone);
  if(!cfg)return '<div class="status">区域配置不存在</div>';
  const startRow=Math.max(1,seat.row-5);
  const endRow=Math.min(cfg.rowCounts.length,seat.row+5);
  const startNo=Math.max(1,seat.no-10);
  const maxAround=Math.max(...cfg.rowCounts.slice(startRow-1,endRow),seat.no+10);
  const endNo=Math.min(maxAround,seat.no+10);
  let rows='';
  for(let r=startRow;r<=endRow;r++){
    const rowMax=cfg.rowCounts[r-1]||0;
    let dots='';
    for(let n=startNo;n<=Math.min(endNo,rowMax);n++){
      const isMine=r===seat.row&&n===seat.no;
      const owner=people.find(p=>p.seat&&p.seat.row===r&&p.seat.no===n);
      dots+='<div class="seat-dot '+(isMine?'mine':owner?'taken':'')+'" title="'+esc(r+'排'+n+'号'+(owner?' · '+owner.weiboName:''))+'">'+(isMine?'我':owner?'':'')+'</div>';
    }
    rows+='<div class="seat-line"><div class="row-label">'+r+'排</div><div class="seat-strip">'+dots+'</div></div>';
  }
  return '<div class="legend"><span><i class="seat-dot mine">我</i>自己</span><span><i class="seat-dot taken"></i>附近同担</span><span><i class="seat-dot"></i>空位/未知</span></div><div class="seat-window">'+rows+'</div>';
}
async function loadNearby(){
  try{
    const data=await rpc('zd_nearby',{p_token:state.token});
    if(!data.seat)return document.getElementById('nearBox').innerHTML='<div class="status">先登记座位后，才会显示附近座位窗口。</div>';
    const people=data.nearby||[];
    const map=renderSeatWindow(data.seat,people);
    const list=people.length?'<div class="near-list">'+people.map(p=>'<div class="row"><div><b>'+esc(p.weiboName)+'</b><small class="muted"> '+seatText(p.seat)+'</small><p>'+esc(p.fanNote||'目前暂无留言')+'</p></div><small>微信名：'+esc(p.wechatName)+'<br>线下群：'+esc(p.offlineGroup)+'</small></div>').join('')+'</div>':'<div class="status">目前暂无附近同担</div>';
    document.getElementById('nearBox').innerHTML=map+list;
  }catch(e){document.getElementById('nearBox').innerHTML='<div class="status">'+esc(e.message)+'</div>'}
}
async function renderAdmin(){ html('<section class="panel"><div class="head"><h3>管理后台</h3></div><div class="body"><div class="tabs">'+['audit:用户审核','users:用户管理','stats:统计','seatmap:座位示意图','config:场馆配置','proof:自证配置'].map(x=>{let [v,l]=x.split(':');return '<button data-tab="'+v+'" class="'+(state.adminTab===v?'active':'')+'">'+l+'</button>'}).join('')+'</div><div id="adminBody">加载中...</div></div></section>'); document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.adminTab=b.dataset.tab;renderAdmin()}); await loadAdmin(); }
async function loadAdmin(){ if(['audit','users'].includes(state.adminTab)){ const d=await rpc('zd_admin_users',{p_token:state.token}); state.users=d.users||[]; state.submissions=d.submissions||[]; return renderAdminUsers(); } if(state.adminTab==='stats') return renderStats(); if(state.adminTab==='seatmap') return renderSeatmap(); if(state.adminTab==='config') return renderConfig(); if(state.adminTab==='proof') return renderProofConfig(); }
function renderAdminUsers(){
  const list=state.users.filter(u=>state.adminTab==='users'||['pending','rejected'].includes(u.status));
  document.getElementById('adminBody').innerHTML=list.length?list.map(u=>'<div class="row '+(u.status==='rejected'?'danger':'')+'"><div><b>'+esc(u.account)+' · '+esc(u.weiboName||'未填微博名')+'</b><small class="muted"> '+esc(u.status)+' '+(u.seat?seatText(u.seat):'未登记')+'</small><p>微信名：'+esc(u.wechatName)+' · 线下群：'+esc(u.offlineGroup)+'</p>'+proofHtml(u.id)+'</div><div class="mini"><button class="btn" data-act="approve" data-id="'+esc(u.id)+'">通过</button><button class="btn danger" data-act="reject" data-id="'+esc(u.id)+'">打回</button><button class="btn secondary" data-act="profile" data-id="'+esc(u.id)+'">改资料</button><button class="btn secondary" data-act="seat" data-id="'+esc(u.id)+'">改座位</button><button class="btn danger" data-act="deactivate" data-id="'+esc(u.id)+'">注销</button></div></div>').join(''):'<div class="status">暂无数据</div>';
  bindProofImages();
  document.querySelectorAll('[data-act]').forEach(btn=>btn.onclick=()=>{
    const id=btn.dataset.id;
    if(btn.dataset.act==='approve') adminStatus(id,'approved');
    if(btn.dataset.act==='reject') adminReject(id);
    if(btn.dataset.act==='profile') adminProfile(id);
    if(btn.dataset.act==='seat') adminSeat(id);
    if(btn.dataset.act==='deactivate') adminStatus(id,'deactivated');
  });
}
function proofHtml(uid){ const sub=state.submissions.find(s=>s.userId===uid); if(!sub) return '<p class="muted">暂无自证</p>'; return '<div class="proofs">'+state.fields.filter(f=>!isProfileField(f)).map(f=>{const v=sub.answers?.[f.id]; if(!v)return '<div class="proof">'+esc(f.label)+'：未提交</div>'; if(v.type==='image')return '<div class="proof"><img src="'+esc(v.url)+'" data-proof-img="'+esc(v.url)+'"><span>'+esc(f.label)+'</span></div>';  return '<div class="proof">'+esc(f.label)+'：'+esc(Array.isArray(v)?v.join('、'):v)+'</div>';}).join('')+'</div>'; }
function bindProofImages(){document.querySelectorAll('[data-proof-img]').forEach(img=>img.onclick=()=>showLightbox(img.dataset.proofImg));}
function showLightbox(src){const box=document.getElementById('lightbox');const image=document.getElementById('lightboxImg');if(!box||!image)return;image.src=src;box.classList.remove('hide')}
function hideLightbox(){const box=document.getElementById('lightbox');if(box)box.classList.add('hide')}
document.addEventListener('click',e=>{if(e.target&&e.target.id==='lightbox')hideLightbox()});
window.adminStatus=async(id,status)=>{ try{ await rpc('zd_admin_set_status',{p_token:state.token,p_user_id:id,p_status:status,p_reason:null}); renderAdmin(); }catch(e){alert(e.message)} };
window.adminReject=async(id)=>{ const r=prompt('请输入打回原因'); if(!r)return; try{ await rpc('zd_admin_set_status',{p_token:state.token,p_user_id:id,p_status:'rejected',p_reason:r}); renderAdmin(); }catch(e){alert(e.message)} };
window.adminProfile=async(id)=>{ const u=state.users.find(x=>x.id===id); if(!u)return; const weibo=prompt('微博名',u.weiboName||''); if(weibo===null)return; const wechat=prompt('微信名',u.wechatName||''); if(wechat===null)return; const offline=prompt('是否在线下群：填 是 或 否',u.offlineGroup||'否'); if(offline===null)return; try{ await rpc('zd_admin_update_profile',{p_token:state.token,p_user_id:id,p_weibo:weibo,p_wechat:wechat,p_offline:offline==='是'}); renderAdmin(); }catch(e){alert(e.message)} };
window.adminSeat=async(id)=>{ const z=prompt('区名，如 310区'); if(!z)return; const r=+prompt('排'); const n=+prompt('号'); try{ await rpc('zd_admin_save_seat',{p_token:state.token,p_user_id:id,p_zone:z,p_row:r,p_no:n}); renderAdmin(); }catch(e){alert(e.message)} };
async function renderStats(){ const s=await rpc('zd_admin_stats',{p_token:state.token}); document.getElementById('adminBody').innerHTML='<div class="stat-grid">'+['totalUsers:总用户','approved:通过','pending:待审核','rejected:打回','deactivated:注销','seated:已登记'].map(x=>{let[k,l]=x.split(':');return '<div class="status">'+l+'<br><b>'+s[k]+'</b></div>'}).join('')+'</div>'+Object.entries(s.byZone||{}).map(([z,c])=>'<div class="row"><b>'+esc(z)+'</b><small>'+c+' 人</small></div>').join(''); }
async function renderSeatmap(){
  const z=state.selectedZone;
  const d=await rpc('zd_admin_seatmap',{p_token:state.token,p_zone:z});
  const rows=d.zone.rowCounts.map((count,i)=>{
    let dots='';
    for(let n=1;n<=count;n++){
      const o=d.seats.find(s=>s.row===i+1&&s.no===n);
      dots+='<div class="seat-dot '+(o?'taken':'')+'" title="'+esc(o?((i+1)+'排'+n+'号 · '+(o.weiboName||'')):'')+'">'+(o?'':'')+'</div>';
    }
    return '<div class="seat-line"><div class="row-label">'+(i+1)+'排</div><div class="seat-strip">'+dots+'</div></div>';
  }).join('');
  const people=d.seats.length?'<div class="near-list">'+d.seats.map(s=>'<div class="row"><div><b>'+esc(s.weiboName||'未填微博名')+'</b><small class="muted"> '+esc(d.zone.zone+'-'+s.row+'排-'+s.no+'号')+'</small><p>'+esc(s.message||'目前暂无留言')+'</p></div><small>微信名：'+esc(s.wechatName||'')+'</small></div>').join('')+'</div>':'<div class="status">这个区目前暂无登记</div>';
  document.getElementById('adminBody').innerHTML='<label class="field">选择区域<select id="adminZone">'+zoneOptions()+'</select></label><div class="status"><b>'+esc(d.zone.zone)+' · 已登记 '+d.seats.length+' 人</b><p class="muted">红色代表已登记座位。座位图可横向滑动查看完整排。</p></div><div class="legend"><span><i class="seat-dot taken"></i>已登记</span><span><i class="seat-dot"></i>空位/未登记</span></div><div class="seat-window">'+rows+'</div>'+people;
  document.getElementById('adminZone').value=z;
  document.getElementById('adminZone').onchange=e=>{state.selectedZone=e.target.value;renderAdmin()};
}
function parseRows(v,rows,max){ const arr=String(v||'').split(/[,，s]+/).map(Number).filter(n=>n>0); return arr.length?arr:Array.from({length:+rows||1},()=>+max||1); }
function renderConfig(){
  const tiers=[...new Set(['一层看台','二层看台','三层看台',...state.zones.map(z=>z.tier)])];
  const tierOptions=tiers.map(t=>'<option>'+esc(t)+'</option>').join('');
  const add='<div class="config-add status" data-config-card="new"><label class="field"><span>新增区名</span><input class="zone-name" placeholder="如 318区"></label><label class="field"><span>楼层</span><select class="zone-tier">'+tierOptions+'</select></label><label class="field"><span>排数</span><input class="zone-rows" value="10"></label><label class="field"><span>最多号</span><input class="zone-max" value="20"></label><label class="field"><span>逐排座位数</span><input class="zone-counts" placeholder="可填 14,14,16；不填则按排数/最多号生成"></label><button class="btn" data-zone-act="save" data-old="">新增区域</button></div>';
  const groups=tiers.map(t=>{
    const items=state.zones.filter(z=>z.tier===t);
    if(!items.length)return '';
    return '<div class="config-group"><h4>'+esc(t)+'</h4>'+items.map(z=>'<div class="config-card" data-config-card="old"><label class="field"><span>区名</span><input class="zone-name" value="'+esc(z.zone)+'"></label><label class="field"><span>楼层</span><select class="zone-tier">'+tiers.map(tt=>'<option '+(tt===z.tier?'selected':'')+'>'+esc(tt)+'</option>').join('')+'</select></label><label class="field"><span>排数</span><input class="zone-rows" value="'+esc(z.rowCounts.length)+'"></label><label class="field"><span>最多号</span><input class="zone-max" value="'+esc(Math.max(...z.rowCounts))+'"></label><label class="field"><span>逐排座位数</span><input class="zone-counts" value="'+esc(z.rowCounts.join(','))+'"></label><button class="btn secondary" data-zone-act="save" data-old="'+esc(z.zone)+'">保存</button><button class="btn danger" data-zone-act="delete" data-old="'+esc(z.zone)+'">删除</button></div>').join('')+'</div>';
  }).join('');
  document.getElementById('adminBody').innerHTML='<div class="config-wrap">'+add+groups+'</div>';
  document.querySelectorAll('[data-zone-act]').forEach(btn=>btn.onclick=()=>{
    if(btn.dataset.zoneAct==='save') saveZone(btn);
    if(btn.dataset.zoneAct==='delete') deleteZone(btn.dataset.old||'');
  });
}
window.saveZone=async(btn)=>{
  try{
    const card=btn.closest('[data-config-card]');
    const old=btn.dataset.old||'';
    const zone=card.querySelector('.zone-name').value.trim();
    const tier=card.querySelector('.zone-tier').value;
    const countsEl=card.querySelector('.zone-counts');
    const rowsEl=card.querySelector('.zone-rows');
    const maxEl=card.querySelector('.zone-max');
    if(!zone)return alert('请填写区名');
    const counts=parseRows(countsEl?countsEl.value:'',rowsEl?rowsEl.value:1,maxEl?maxEl.value:1);
    await rpc('zd_admin_save_zone',{p_token:state.token,p_old_zone:old,p_tier:tier,p_zone:zone,p_row_counts:counts});
    state.zones=await rpc('zd_zones');
    renderAdmin();
  }catch(e){alert(e.message)}
};
window.deleteZone=async(z)=>{ if(!confirm('确定删除 '+z+' 吗？已经有人登记的区不能删除。'))return; try{await rpc('zd_admin_delete_zone',{p_token:state.token,p_zone:z}); state.zones=await rpc('zd_zones'); renderAdmin();}catch(e){alert(e.message)}};
function renderProofConfig(){
  document.getElementById('adminBody').innerHTML='<div class="row"><input id="pfLabel" placeholder="新增项名称"><select id="pfType"><option value="image">图片上传</option><option value="text">填空</option><option value="radio">单选</option><option value="checkbox">多选</option></select><input id="pfOptions" placeholder="选项 是,否"><button class="btn" id="addFieldBtn">新增</button></div>'+state.fields.filter(f=>!isProfileField(f)).map(f=>'<div class="row"><b>'+esc(f.label)+'</b><small>'+esc(f.type)+'</small><button class="btn danger" data-field-id="'+esc(f.id)+'">删除</button></div>').join('');
  document.getElementById('addFieldBtn').onclick=addField;
  document.querySelectorAll('[data-field-id]').forEach(btn=>btn.onclick=()=>deleteField(btn.dataset.fieldId));
}
window.addField=async()=>{ try{ await rpc('zd_admin_add_proof_field',{p_token:state.token,p_label:document.getElementById('pfLabel').value,p_type:document.getElementById('pfType').value,p_options:document.getElementById('pfOptions').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean)}); state.fields=await rpc('zd_proof_fields'); renderAdmin(); }catch(e){alert(e.message)} };
window.deleteField=async(id)=>{ try{ await rpc('zd_admin_delete_proof_field',{p_token:state.token,p_field_id:id}); state.fields=await rpc('zd_proof_fields'); renderAdmin(); }catch(e){alert(e.message)} };
boot();
</script>
</body>
</html>
